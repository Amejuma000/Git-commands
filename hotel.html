<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Feedback Form</title>
</head>
<body>
    <header>
        <h1>Hotel Feedback Form</h1>
        <p> Thank you for staying with us. Please provide feedback on your recent experience</p>
    </header>
    <main>
        <form action="https://stecs.solutions" method="post">
           
            <!-- Personal Information -->
           
            <fieldset>
                <legend>Personal information</legend>
                <label for="name">full Name</label>
                <input 
                type="text" 
                id="name" 
                name="name"
                placeholder="Enter your full name"
                size="20"
                required>
                <br><br>
                <label for="email">email address</label>
                <input 
                type="email" 
                id="email" 
                name="email"
                placeholder="example@email.com"
                size="20"
                required>

            </fieldset>
            <br><br>
            <!-- Hotel Feedback Form-->
        <fieldset>
            <label for="age">Age</label>
            <input 
            type="number" 
            id="age" 
            name="age"
            placeholder="Enter your age"
            min="3"
            max="100">
        </fieldset>
        <br><br>
        <fieldset>
            <legend>Was this your first time at our hotel?</legend>
            <input type="radio"
            id="yes-option"
            name="hotel-stay"
            value="yes">
            <label for="yes-option">Yes</label>
            <br>
            <input type="radio"
            id="no-option"
            name="hotel-stay"
            value="no">
            <label for="no-option">No</label>

        </fieldset>
        <br><br>
        <fieldset>
            <legend> Why did you choose to stay at our hotel? (Check all that apply)</legend>
            <input type="checkbox"
            id="ads"
            name="choice"
            value="ads">
            <label for="ads">Social Media Ads</label>
            <br>
            <input type="checkbox"
            id="recommendation"
            name="choice"
            value="recommendation">
            <label for="recommendation">Personal Recommendations</label>
            <br>
            <input type="checkbox"
            id="location"
            name="choice"
            value="location">
            <label for="location">Location</label>
            <br>
             <input checked type="checked"
            id="reputation"
            name="choice"
            value="reputation">
            <label for="reputation">Reputation</label>
             <br>
             <input type="checkbox"
             id="price"
             name="choice"
             value="price">
             <label for="price">Price</label>
        </fieldset>
        <br><br>

        <!-- Ratings -->

        <fieldset>
            <legend>Ratings</legend>
            <label for="service"> How was the service?</label>
            <select id="service" name="service">
                <option selected>Select an option</option>
                <option value="excellent">Excellent</option>
                <option value="very good">Very Good</option>
                <option value="satisfactory">Satisfactory</option>
                <option value="good">Good</option>
                <option value="poor">Poor</option>
            </select>
            
            <!--food rating-->
            <label for="food"> How was the food?</label>
            <select id="food" name="food">
                <option selected>Select an option</option>
                <option value="excellent">Excellent</option>
                <option value="very good">Very Good</option>
                <option value="satisfactory">Satisfactory</option>
                <option value="good">Good</option>
                <option value="poor">Poor</option>
            </select>
            <label for="comments">Other comments?</label>
            <textarea id="comments" 
            name="comments" 
            rows="10" cols="30" placeholder="Please share any additional feedback..."></textarea>
        </fieldset>
        <button type="submit">Submit</button>
    

        
        </form>
    </main>
    
</body>
</html>
