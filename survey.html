<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Customer feedback survey form">
    <title>Survey Form</title>
</head>

<body>

    <!-- Title -->
    <h1 id="title">Customer Feedback Survey</h1>

    <!-- Description -->
    <p id="description">
        Please fill out this survey form to help us improve our services.
    </p>

    <!-- Form -->
    <form id="survey-form">

        <!-- Name -->
        <label id="name-label" for="name">
            Name
        </label>

        <input
            type="text"
            id="name"
            placeholder="Enter your full name"
            required
        >

        <br><br>

        <!-- Email -->
        <label id="email-label" for="email">
            Email
        </label>

        <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
        >

        <br><br>

        <!-- Number -->
        <label id="number-label" for="number">
            Age
        </label>

        <input
            type="number"
            id="number"
            placeholder="Enter your age"
            min="18"
            max="60"
        >

        <br><br>

        <!-- Dropdown -->
        <label for="dropdown">
            Choose your favorite service
        </label>

        <select id="dropdown">

            <option value="">
                Select an option
            </option>

            <option value="web-design">
                Web Design
            </option>

            <option value="frontend-development">
                Frontend Development
            </option>

        </select>

        <br><br>

        <!-- Radio Buttons -->
        <p>Would you recommend our service?</p>

        <label>
            <input
                type="radio"
                name="recommend"
                value="yes"
            >
            Yes
        </label>

        <label>
            <input
                type="radio"
                name="recommend"
                value="no"
            >
            No
        </label>

        <br><br>

        <!-- Checkboxes -->
        <p>Which features do you like?</p>

        <label>
            <input
                type="checkbox"
                value="responsive-design"
            >
            Responsive Design
        </label>

        <label>
            <input
                type="checkbox"
                value="easy-navigation"
            >
            Easy Navigation
        </label>

        <label>
            <input
                type="checkbox"
                value="modern-layout"
            >
            Modern Layout
        </label>

        <br><br>

        <!-- Textarea -->
        <label for="comments">
            Additional Comments
        </label>

        <br>

        <textarea
            id="comments"
            rows="5"
            cols="40"
            placeholder="Write your comments here..."
        ></textarea>

        <br><br>

        <!-- Submit Button -->
        <button id="submit" type="submit">
            Submit
        </button>

    </form>

</body>
</html>
